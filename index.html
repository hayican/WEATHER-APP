<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER APP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
    <div class="search">
        <input type="text" class="search-input" placeholder="Cari Kota...">
        <button class="search-button">Search</button>
    </div>

        <div class="weather-card">
            
            <div class="weather-left">
                <img src="https://openweathermap.org/img/wn/10d@2x.png" class="weather-icon" alt="icon cuaca">
                <h2 class="city">Sidoarjo</h2>
                <h1 class="temp">25°C</h1>
            </div>

            <div class="weather-right">
                <h3 class="description">Cerah Berawan</h3>
                
                <div class="details">
                    <div class="col">
                        <p class="humidity">50%</p>
                        <p>Kelembapan</p>
                    </div>

                    <div class="col">
                        <p class="wind">10 km/h</p>
                        <p>Angin</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
